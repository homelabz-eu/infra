---
- name: Harbor Registry
  hosts: "{{ target_hosts | default('harbor') }}"
  become: true
  gather_facts: yes
  vars:
    harbor_version: "v2.14.0"
    harbor_domain: "registry.homelabz.eu"
    harbor_data_dir: "/data"
    harbor_install_dir: "/opt/harbor"
    harbor_cert_dir: "/data/cert"

  handlers:
    - name: restart harbor
      shell: cd {{ harbor_install_dir }} && docker compose down && docker compose up -d

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
      tags: [install]

    - name: Install Docker and dependencies
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - python3-docker
          - certbot
          - python3-certbot-dns-cloudflare
          - ca-certificates
          - curl
        state: present
      tags: [install]

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started
      tags: [install]

    - name: Add suporte to docker group
      user:
        name: suporte
        groups: docker
        append: yes
      tags: [install]

    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ harbor_data_dir }}"
        - "{{ harbor_cert_dir }}"
      tags: [install]

    - name: Create Cloudflare credentials file
      copy:
        content: |
          dns_cloudflare_api_token = {{ cloudflare_api_token }}
        dest: /etc/letsencrypt/cloudflare.ini
        mode: "0600"
        owner: root
        group: root
      when: cloudflare_api_token is defined
      tags: [config]

    - name: Generate Let's Encrypt certificate
      command: >
        certbot certonly
        --dns-cloudflare
        --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
        --email {{ cloudflare_email }}
        --agree-tos
        --non-interactive
        --domains {{ harbor_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ harbor_domain }}/fullchain.pem"
      tags: [config]

    - name: Copy certificates to Harbor cert directory
      copy:
        src: "/etc/letsencrypt/live/{{ harbor_domain }}/{{ item.src }}"
        dest: "{{ harbor_cert_dir }}/{{ item.dest }}"
        owner: root
        group: root
        mode: "0600"
        remote_src: true
      loop:
        - { src: "fullchain.pem", dest: "server.crt" }
        - { src: "privkey.pem", dest: "server.key" }
      tags: [config]

    - name: Set up certificate renewal cron job
      cron:
        name: "Renew Let's Encrypt certificates for Harbor"
        minute: "0"
        hour: "3"
        job: "certbot renew --quiet && cp /etc/letsencrypt/live/{{ harbor_domain }}/fullchain.pem {{ harbor_cert_dir }}/server.crt && cp /etc/letsencrypt/live/{{ harbor_domain }}/privkey.pem {{ harbor_cert_dir }}/server.key && cd {{ harbor_install_dir }} && docker compose down && docker compose up -d >> /var/log/harbor-cert-renewal.log 2>&1"
        user: root
      tags: [config]

    - name: Check if Harbor is already installed
      stat:
        path: "{{ harbor_install_dir }}/harbor.yml"
      register: harbor_installed
      tags: [install]

    - name: Download Harbor offline installer
      get_url:
        url: "https://github.com/goharbor/harbor/releases/download/{{ harbor_version }}/harbor-offline-installer-{{ harbor_version }}.tgz"
        dest: /tmp/harbor-installer.tgz
      when: not harbor_installed.stat.exists
      tags: [install]

    - name: Extract Harbor installer
      unarchive:
        src: /tmp/harbor-installer.tgz
        dest: /opt/
        remote_src: yes
      when: not harbor_installed.stat.exists
      tags: [install]

    - name: Template harbor.yml configuration
      template:
        src: templates/harbor.yml.j2
        dest: "{{ harbor_install_dir }}/harbor.yml"
        mode: "0600"
      tags: [config]

    - name: Run Harbor installer
      command: "{{ harbor_install_dir }}/install.sh --with-trivy"
      args:
        chdir: "{{ harbor_install_dir }}"
      tags: [install]

    - name: Verify Harbor is running
      uri:
        url: "https://127.0.0.1/api/v2.0/health"
        validate_certs: false
        status_code: 200
      register: health_check
      retries: 15
      delay: 10
      until: health_check.status == 200
      tags: [install]

    - name: Create docker-compose systemd service
      copy:
        dest: /etc/systemd/system/harbor.service
        content: |
          [Unit]
          Description=Harbor Container Registry
          After=docker.service
          Requires=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ harbor_install_dir }}
          ExecStart=/usr/bin/docker compose up -d
          ExecStop=/usr/bin/docker compose down

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      tags: [install]

    - name: Enable Harbor service
      systemd:
        name: harbor
        enabled: yes
        daemon_reload: yes
      tags: [install]

    - name: Display Harbor status
      debug:
        msg: "Harbor {{ harbor_version }} is running at https://{{ harbor_domain }}"
      tags: [install]
